name: OpenCode PR Review

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

jobs:
  review:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      id-token: write
      contents: read
      pull-requests: write
      issues: read
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - uses: anomalyco/opencode/github@latest
        env:
          OPENCODE_API_KEY: ${{ secrets.OPENCODE_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          model: opencode/big-pickle
          use_github_token: true
          prompt: |
            请审查此 Pull Request，严格基于 Git Diff 中实际变更的文件进行检查。按以下优先级逐项审查，仅报告与变更相关的问题：

            ## 0. 安全与敏感信息（最高优先级）
            - 是否硬编码密钥、Token、密码或内部 URL/IP？
            - 用户输入是否经过校验/转义（防 XSS/SQL 注入）？
            - 是否存在敏感数据日志打印或前端暴露风险？

            ## 1. 引擎函数（src/engine/）
            - 是否为纯函数？若引用全局 state/DOM，是否有合理理由（如初始化、副作用标记）？
            - 返回值类型是否显式声明？（允许 void/undefined 省略）
            - 公开函数是否有 JSDoc（@param / @returns）？
            - 新增/修改的引擎函数是否在 __tests__/ 下有对应测试文件？
            - 测试是否覆盖正常路径与关键边界条件？（注：仅需检查测试代码存在性与覆盖逻辑，无需执行）

            ## 1.5. 性能与资源管理
            - 循环内是否有重复计算/对象创建？大数组操作是否使用高效算法？
            - 事件监听器/定时器/订阅是否在组件卸载或作用域结束时正确清理？
            - 是否存在潜在内存泄漏或阻塞主线程的操作？

            ## 2. 类型、配置与向后兼容性
            - 新增类型定义是否位于 src/types/ 目录？
            - JSON 配置模板中引用的 ID 是否在代码中存在对应定义？
            - 枚举内部 key 是否使用英文命名？
            - 公开 API/导出函数签名是否发生变更？配置字段是否删除或重命名？若存在破坏性变更，是否在 PR 描述或注释中标注迁移方案？

            ## 3. 状态管理
            - 状态变更是否统一通过 dispatch(action) 触发？禁止直接 mutation。

            ## 4. 代码质量与国际化
            - 是否存在遗留的 console.log/debugger？
            - non-null assertion (!) 是否有充分依据？是否可用可选链/默认值替代？
            - any 类型使用是否必要？是否可替换为 unknown 或具体类型？
            - UI 相关字符串是否提取至 i18n 资源文件？引擎层是否避免拼接用户可见文本？日期/数字格式化是否使用 locale-aware API？

            ## 5. 注释规范
            - 新增文件是否包含文件头 JSDoc（描述用途、作者、日期）？
            - 导出的函数/类/接口是否有完整 JSDoc？

            ## 6. 测试
            - 新增引擎函数是否有配套测试（正常路径 + 边界）
            - 测试文件是否使用 createTestStore() 隔离，而非导入模块级 dispatch()
            - 覆盖率门槛：engine ≥90% lines、config ≥80%、store ≥70%

            ## 7. 引擎文件长度
            - src/engine/ 下单个文件是否超过 200 行，超过则建议拆分

            ## 8. SolidJS 规范
            - 列表渲染是否使用 <For each={list}> 而非 Array.map()
            - 是否误用了 React hooks（useState、useEffect、useContext 等）
            - 状态管理是否使用 createStore + produce，而非自建响应式

            ## 9. Commit 信息
            - 是否符合 Conventional Commits 格式（feat/fix/refactor/test/docs/chore + scope）

            ## 输出要求
            - 仅列出实际存在的问题，按严重等级标注：🔴 阻塞（必须修复）、🟡 建议（推荐优化）
            - 每条问题格式：[等级] 文件路径:行号 - 问题描述
            - 若某项检查无问题，跳过该项，不输出 ✅
            - 若全部检查通过，仅回复：✅ 审查通过
            - 禁止输出审查过程、总结语或与问题无关的内容
